<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"> </script>
    <script type="text/javascript">
        (function () {
            emailjs.init("ZZn3r8rCD-zufd4kq");
        })();
    </script>

</head>

<body>
    <form action="">
        <label for="fname">First Name</label>
        <input type="text" id="fname" class="form-details" placeholder="Your name..">
        <span id="fename"></span><br>

        <label for="country">Email:</label>
        <input type="email" id="email" class="form-details" placeholder="Your Email..">
        <span id="feemail"></span><br>

        <label for="subject">Subject</label>
        <textarea id="subject" class="form-details" placeholder="Write something.."></textarea>
        <span id="fesubject"></span><br>

        <div class="form-foot">
            <button type="button" class="butt" onclick="sendemail(event)">Send Message</button>
        </div>


    </form>
</body>

<script>
    function sendemail() {
        debugger;

        var email = document.getElementById("email").value;
        var from_name = document.getElementById("fname").value;
        var message = document.getElementById("subject").value;

        var templateParams = {
            email: email,
            to_name: from_name,
            message: message
        };

        emailjs.send('service_orhkohl', 'template_q0z59cj', templateParams)
            .then(function (response) {
                console.log('SUCCESS!', response.status, response.text);
                window.alert("Sent successfully!");

            })


    }
</script>

</html>
